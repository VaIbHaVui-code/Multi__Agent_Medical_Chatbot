<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot AI - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .glass-panel { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(75, 85, 99, 0.4); }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center gap-3 border-b border-gray-700">
            <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-robot text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider">MEDIBOT</h1>
        </div>
        <div class="p-4">
            <button onclick="window.location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded flex items-center justify-center gap-2 transition shadow-lg shadow-blue-900/50">
                <i class="fas fa-plus"></i> New Session
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 space-y-2">
            <p class="text-xs text-gray-500 uppercase font-bold mt-4 mb-2">Active Protocols</p>
            <div class="p-3 bg-gray-700/50 rounded border-l-4 border-green-500"><p class="text-sm font-bold">Voice Core</p><p class="text-xs text-green-400">Ready</p></div>
            <div class="p-3 bg-gray-700/50 rounded border-l-4 border-blue-500"><p class="text-sm font-bold">Vision Engine</p><p class="text-xs text-blue-400">Standby</p></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-gradient-to-br from-gray-900 to-gray-800">
        <header class="h-16 border-b border-gray-700 flex items-center justify-between px-6 bg-gray-800/80 backdrop-blur-md z-10">
            <div>
                <h2 class="font-bold text-lg">Live Consultation</h2>
                <p class="text-xs text-gray-400">Session ID: <span id="session-id">Loading...</span></p>
            </div>
            <div id="risk-badge" class="hidden flex items-center gap-2 px-4 py-1.5 rounded-full bg-gray-700 border border-gray-600 transition-all duration-500">
                <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                <span class="text-xs font-bold uppercase tracking-wider">System Idle</span>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth">
            <div class="flex gap-4 fade-in">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center">
                    <i class="fas fa-user-md text-white"></i>
                </div>
                <div class="bg-gray-700 p-4 rounded-r-xl rounded-bl-xl max-w-[80%]">
                    <p class="text-sm text-gray-300">Hello. I am Dr. AI. I will analyze your symptoms using my multi-agent council. Please describe how you are feeling.</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-800 border-t border-gray-700">
            <div class="flex items-center gap-2 max-w-4xl mx-auto bg-gray-900 p-2 rounded-lg border border-gray-600 focus-within:border-blue-500 transition shadow-lg">
                <input id="user-input" type="text" class="flex-1 bg-transparent text-white px-4 focus:outline-none" placeholder="Type here..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()" class="w-10 h-10 bg-blue-600 hover:bg-blue-500 rounded-lg flex items-center justify-center transition text-white">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <aside class="w-80 bg-gray-800 border-l border-gray-700 p-4 flex flex-col gap-6 overflow-y-auto hidden lg:flex">
        
        <div class="glass-panel p-4 rounded-xl">
            <h3 class="font-bold text-gray-300 mb-2 flex items-center gap-2"><i class="fas fa-microphone-alt text-blue-400"></i> Voice Core</h3>
            <div class="flex items-center justify-between bg-gray-900 rounded p-3 mb-4">
                <span class="text-xs text-gray-400">STATUS</span>
                <span id="voice-status-text" class="text-xs font-bold text-red-500">OFFLINE</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="toggleVoice(true)" class="bg-green-600/20 text-green-400 hover:bg-green-600 hover:text-white py-2 rounded border border-green-600/50 transition font-bold text-xs">ON</button>
                <button onclick="toggleVoice(false)" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white py-2 rounded border border-red-600/50 transition font-bold text-xs">OFF</button>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-xl">
            <h3 class="font-bold text-gray-300 mb-2 flex items-center gap-2"><i class="fas fa-eye text-cyan-400"></i> Injury Scanner</h3>
            <div class="bg-black rounded-lg h-40 flex items-center justify-center border border-gray-600 mb-3 relative overflow-hidden group">
                <video id="webcam" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                <canvas id="snapshot" class="hidden"></canvas>
                <p id="cam-placeholder" class="text-xs text-gray-500 group-hover:text-gray-300 transition">Camera Off</p>
            </div>
            <button id="btn-cam-start" onclick="startCamera()" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded text-xs mb-2 text-gray-300">Start Camera</button>
            <button onclick="scanInjury()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded font-bold text-xs shadow-lg shadow-cyan-900/50">SCAN & DIAGNOSE</button>
            <p id="scan-result" class="mt-2 text-xs text-cyan-300 min-h-[20px] font-mono"></p>
        </div>
    </aside>

    <script>
        const API_URL = "http://localhost:8000"; 
        
        // Generate a random User ID for this session (so the Python server remembers Age/History)
        const USER_ID = "user_" + Math.floor(Math.random() * 10000);
        document.getElementById('session-id').innerText = USER_ID;

        // --- CHAT LOGIC ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage("You", message, "bg-blue-600", "justify-end");
            input.value = "";
            
            // Show Thinking Indicator
            const loadingId = addMessage("System", '<div class="flex gap-1"><div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div><div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div><div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div></div>', "bg-gray-700", "justify-start");

            const formData = new FormData();
            formData.append("user_id", USER_ID); // CRITICAL: Send the ID!
            formData.append("message", message);

            try {
                const res = await fetch(`${API_URL}/api/chat`, { method: "POST", body: formData });
                const data = await res.json();
                
                document.getElementById(loadingId).remove();

                // Show AI Reply
                addMessage("Dr. AI", data.reply, "bg-gray-700", "justify-start");
                
                // Update Badge based on the Risk sent by Python
                updateRiskBadge(data.risk);

            } catch (e) {
                console.error(e);
                document.getElementById(loadingId).innerText = "Error: Server Disconnected.";
            }
        }

        function addMessage(sender, text, bgClass, alignClass) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `flex ${alignClass} animate-fade-in`;
            div.innerHTML = `
                <div class="${bgClass} text-white p-3 rounded-xl max-w-[85%] shadow-md border border-white/5">
                    <p class="text-[10px] opacity-50 mb-1 font-bold uppercase tracking-wider">${sender}</p>
                    <div class="text-sm leading-relaxed">${text}</div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div.querySelector('div').id = "msg-" + Date.now();
        }

        function updateRiskBadge(risk) {
            const badge = document.getElementById('risk-badge');
            const dot = badge.querySelector('span');
            const text = badge.querySelector('span:last-child');
            
            badge.classList.remove('hidden');
            
            // Handle "System" messages (Age questions) - Make badge gray/invisible
            if (risk === 'SYSTEM' || risk === 'INFO' || risk === 'NONE') {
                dot.className = "w-2 h-2 rounded-full bg-blue-400";
                text.innerText = "Info / Intake";
                text.className = "text-xs font-bold uppercase tracking-wider text-blue-300";
                badge.className = "flex items-center gap-2 px-4 py-1.5 rounded-full bg-blue-900/30 border border-blue-500/50";
                return;
            }

            // Real Medical Risks
            if (risk === 'HIGH' || risk === 'CRITICAL') {
                dot.className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
                text.innerText = "CRITICAL RISK DETECTED";
                text.className = "text-xs font-bold uppercase tracking-wider text-red-400";
                badge.className = "flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.5)]";
            } else if (risk === 'MEDIUM') {
                dot.className = "w-2 h-2 rounded-full bg-yellow-500";
                text.innerText = "MEDIUM RISK";
                text.className = "text-xs font-bold uppercase tracking-wider text-yellow-400";
                badge.className = "flex items-center gap-2 px-4 py-1.5 rounded-full bg-yellow-900/30 border border-yellow-500/50";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-green-500";
                text.innerText = "LOW RISK";
                text.className = "text-xs font-bold uppercase tracking-wider text-green-400";
                badge.className = "flex items-center gap-2 px-4 py-1.5 rounded-full bg-green-900/30 border border-green-500/50";
            }
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        // --- VOICE & VISION (Same as before) ---
        async function toggleVoice(turnOn) {
            const statusText = document.getElementById('voice-status-text');
            statusText.innerText = "CONNECTING...";
            try {
                const res = await fetch(`${API_URL}/api/voice/${turnOn ? 'start' : 'stop'}`, { method: "POST" });
                const data = await res.json();
                statusText.innerText = turnOn ? "ACTIVE (LISTENING)" : "OFFLINE";
                statusText.className = turnOn ? "text-xs font-bold text-green-400 animate-pulse" : "text-xs font-bold text-red-500";
            } catch (e) { statusText.innerText = "CONNECTION FAILED"; }
        }

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('cam-placeholder').classList.add('hidden');
                document.getElementById('btn-cam-start').classList.add('hidden');
            } catch (err) { alert("Camera access denied."); }
        }

        function scanInjury() {
            const resultText = document.getElementById('scan-result');
            resultText.innerText = "Scanning...";
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("file", blob, "scan.jpg");
                try {
                    const res = await fetch(`${API_URL}/api/scan`, { method: "POST", body: formData });
                    const data = await res.json();
                    resultText.innerText = "Dx: " + data.diagnosis;
                } catch (e) { resultText.innerText = "Scan Failed."; }
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
